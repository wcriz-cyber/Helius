name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzar manualmente desde GitHub UI

jobs:
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      # 1 — Descargar el repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2 — Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3 — Java 17 (requerido por Gradle/Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4 — Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5 — Instalar dependencias npm + FCM plugin
      - name: Instalar dependencias
        run: |
          npm install
          npm install @capacitor/push-notifications@latest --save
          echo "✅ Dependencias instaladas incluyendo FCM"

      # 6 — Copiar assets web a www/
      - name: Preparar assets web (www/)
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp sw.js www/sw.js
          [ -f icon.png ] && cp icon.png www/icon.png
          echo "✅ www/ listo:"
          ls -la www/

      # 7 — Generar íconos Android
      - name: Generar íconos Android
        run: |
          mkdir -p resources
          cp www/icon.png resources/icon.png
          npx @capacitor/assets generate --android
          echo "✅ Íconos Android generados"

      # 8 — Parchear android/build.gradle para google-services
      - name: Parchear android/build.gradle (google-services)
        run: |
          GRADLE=android/build.gradle
          if grep -q "com.google.gms:google-services" "$GRADLE"; then
            echo "✅ google-services ya presente en $GRADLE"
          else
            # Insertar classpath dentro del bloque dependencies {} de buildscript
            sed -i '/buildscript {/,/^}/ {
              /dependencies {/ a\        classpath '\''com.google.gms:google-services:4.4.1'\''
            }' "$GRADLE"
            echo "✅ google-services classpath añadido a $GRADLE"
          fi
          cat "$GRADLE"

      # 9 — Parchear android/app/build.gradle para aplicar plugin google-services
      - name: Parchear android/app/build.gradle (apply plugin)
        run: |
          GRADLE=android/app/build.gradle
          if grep -q "com.google.gms.google-services" "$GRADLE"; then
            echo "✅ plugin google-services ya presente en $GRADLE"
          else
            echo "" >> "$GRADLE"
            echo "apply plugin: 'com.google.gms.google-services'" >> "$GRADLE"
            echo "✅ plugin google-services añadido a $GRADLE"
          fi
          tail -5 "$GRADLE"

      # 10 — Verificar google-services.json
      - name: Verificar google-services.json
        run: |
          if [ -f android/app/google-services.json ]; then
            echo "✅ google-services.json encontrado"
            cat android/app/google-services.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('Project:', d['project_info']['project_id'])"
          else
            echo "❌ ERROR: android/app/google-services.json NO encontrado"
            echo "   → Regístra la app en Firebase Console y sube el archivo"
            exit 1
          fi

      # 11 — Sincronizar assets web con Android (incluye FCM plugin)
      - name: Sincronizar assets web con Android
        run: npx cap sync android

      # 12 — Compilar APK debug
      - name: Compilar APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace

      # 13 — Subir APK como artifact descargable
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: 5X-Trading-FCM-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 14 — Info del APK
      - name: Info APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh $APK | cut -f1)
          echo "✅ APK con FCM compilado exitosamente"
          echo "📦 Tamaño: $SIZE"
          echo "📥 Descárgalo en: Actions → este workflow → Artifacts"
