name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzar manualmente desde GitHub UI

jobs:
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      # 1 — Descargar el repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2 — Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3 — Java 17 (requerido por Gradle/Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4 — Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5 — Instalar dependencias npm (Capacitor)
      - name: Instalar dependencias
        run: npm ci

      # 6 — Copiar assets web → carpeta android
      - name: Sincronizar assets web con Android
        run: npx cap sync android

      # 7 — Compilar APK debug (instalable directamente)
      - name: Compilar APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      # 8 — Subir APK como artifact descargable
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: 5X-Trading-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 9 — Mostrar info del APK
      - name: Info APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh $APK | cut -f1)
          echo "✅ APK compilado exitosamente"
          echo "📦 Tamaño: $SIZE"
          echo "📥 Descárgalo en: Actions → este workflow → Artifacts"
